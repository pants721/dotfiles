format = """
$username$hostname$directory$git_branch$exit_code$character"""

right_format = "$time"
add_newline = false

[time]
disabled = false
format = "[$time]($style)"
time_format = "%H:%M:%S"
style = "green bold"

[username]
disabled = false
show_always = true
format = "[$user]($style)"
style_user = "green bold"
style_root = "red bold"

[hostname]
disabled = false
ssh_only = false
format = "[@$hostname]($style):"
style = "green bold"

[directory]
format = "[$path]($style) "
style = "blue bold"
truncation_length = 3
truncate_to_repo = false

[git_branch]
format = "\\([$branch]($style)\\) "
style = "yellow bold"

[character]
success_symbol = "[\\$](white bold)"
error_symbol = "[\\$](red bold)"
